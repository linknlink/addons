<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACS Installer</title>
    <style>
        :root {
            --success-bg: #d1fae5;
            --success-text: #065f46;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
            --muted-bg: #eef2ff;
            --muted-text: #4338ca;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .status {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 500;
        }

        .status.installed {
            background-color: #d1fae5;
            color: #065f46;
        }

        .status.not-installed {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        button {
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        .btn-install {
            background-color: #007aff;
            color: white;
        }

        .btn-install:hover {
            background-color: #0063cc;
        }

        .btn-uninstall {
            background-color: #ef4444;
            color: white;
        }

        .btn-uninstall:hover {
            background-color: #dc2626;
        }

        .btn-restart {
            background-color: #f59e0b;
            color: white;
        }

        .btn-restart:hover {
            background-color: #d97706;
        }

        button:disabled {
            background-color: #bfbfbf;
            cursor: not-allowed;
        }

        .message {
            margin-top: 1rem;
            padding: 0.875rem 1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            display: none;
            border: 1px solid transparent;
        }

        .message.visible {
            display: block;
        }

        .message.success {
            background-color: var(--success-bg);
            color: var(--success-text);
            border-color: #a7f3d0;
        }

        .message.error {
            background-color: var(--error-bg);
            color: var(--error-text);
            border-color: #fecaca;
        }

        .message.info {
            background-color: var(--muted-bg);
            color: var(--muted-text);
            border-color: #c7d2fe;
        }

        .message-title {
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .message-detail {
            font-family: ui-monospace, SFMono-Regular, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 0.78rem;
            line-height: 1.45;
        }

        .message-detail:empty {
            display: none;
        }

        .progress {
            display: none;
            margin-top: 1rem;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #007aff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 自定义确认弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 14px;
            padding: 1.5rem;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalIn 0.2s ease-out;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .modal-message {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 1.25rem;
            line-height: 1.4;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.15s;
        }

        .modal-btn-cancel {
            background-color: #e5e7eb;
            color: #374151;
        }

        .modal-btn-cancel:hover {
            background-color: #d1d5db;
        }

        .modal-btn-confirm {
            background-color: #ef4444;
            color: white;
        }

        .modal-btn-confirm:hover {
            background-color: #dc2626;
        }

        .modal-btn-confirm.warn {
            background-color: #f59e0b;
        }

        .modal-btn-confirm.warn:hover {
            background-color: #d97706;
        }

        .divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 12px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>HACS Installer</h1>

        <div id="status-box" class="status {{ 'installed' if installed else 'not-installed' }}">
            {{ 'HACS Installed' if installed else 'HACS Not Installed' }}
        </div>

        <p class="description">
            Manage your Home Assistant Community Store (HACS).
            <br>
            <small>Target Path: {{ target_path }}</small>
        </p>

        <div class="btn-group">
            <button id="install-btn" class="btn-install"
                onclick="{{ 'showConfirm(\'Reinstall HACS\', \'This will remove the current HACS and download the latest version. Continue?\', function() { startOperation(\'install\'); })' if installed else 'startOperation(\'install\')' }}">
                {{ 'Reinstall' if installed else 'Install HACS' }}
            </button>
            <button id="uninstall-btn" class="btn-uninstall"
                onclick="showConfirm('Uninstall HACS', 'This will completely remove HACS from your Home Assistant. Continue?', function() { startOperation('uninstall'); })"
                {{ '' if installed else 'disabled' }}>
                Uninstall HACS
            </button>

            <hr class="divider">

            <button id="restart-btn" class="btn-restart"
                onclick="showConfirm('Restart Home Assistant', 'This will restart the Home Assistant container. All automations will be temporarily interrupted. Continue?', function() { restartHA(); }, 'warn')">
                Restart Home Assistant
            </button>
        </div>

        <div id="progress" class="progress">
            <div class="spinner"></div>
            <span id="progress-text">Processing...</span>
        </div>

        <div id="result-message" class="message">
            <div id="result-title" class="message-title"></div>
            <div id="result-detail" class="message-detail"></div>
        </div>
    </div>

    <!-- 自定义确认弹窗 -->
    <div id="confirm-modal" class="modal-overlay">
        <div class="modal">
            <div id="modal-title" class="modal-title"></div>
            <div id="modal-message" class="modal-message"></div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="hideConfirm()">Cancel</button>
                <button id="modal-confirm-btn" class="modal-btn modal-btn-confirm"
                    onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // 确认弹窗回调
        let pendingAction = null;
        let statusPoller = null;
        let activeOperationId = null;
        let hacsInstalled = {{ 'true' if installed else 'false' }};

        function showConfirm(title, message, action, style) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            const confirmBtn = document.getElementById('modal-confirm-btn');
            confirmBtn.className = 'modal-btn modal-btn-confirm' + (style === 'warn' ? ' warn' : '');
            pendingAction = action;
            document.getElementById('confirm-modal').classList.add('active');
        }

        function hideConfirm() {
            document.getElementById('confirm-modal').classList.remove('active');
            pendingAction = null;
        }

        function confirmAction() {
            const action = pendingAction;
            hideConfirm();
            if (action) {
                action();
            }
        }

        function syncButtonAvailability(isBusy) {
            document.getElementById('install-btn').disabled = isBusy;
            document.getElementById('uninstall-btn').disabled = isBusy || !hacsInstalled;
            document.getElementById('restart-btn').disabled = isBusy;
        }

        function clearStatusPoller() {
            if (statusPoller) {
                clearInterval(statusPoller);
                statusPoller = null;
            }
        }

        function showProgress(message) {
            document.getElementById('progress').style.display = 'block';
            document.getElementById('progress-text').textContent = message || 'Processing...';
        }

        function hideProgress() {
            document.getElementById('progress').style.display = 'none';
        }

        function resetResult() {
            document.getElementById('result-message').className = 'message';
            document.getElementById('result-title').textContent = '';
            document.getElementById('result-detail').textContent = '';
        }

        function showResult(type, message, detail = '') {
            const resultBox = document.getElementById('result-message');
            const resultTitle = document.getElementById('result-title');
            const resultDetail = document.getElementById('result-detail');

            hideProgress();
            resultBox.className = 'message visible ' + type;
            resultTitle.textContent = message || '';
            resultDetail.textContent = detail || '';
        }

        function applyInstalledState(installed) {
            const statusBox = document.getElementById('status-box');
            const installBtn = document.getElementById('install-btn');
            hacsInstalled = installed;

            if (installed) {
                statusBox.className = 'status installed';
                statusBox.textContent = 'HACS Installed';
                installBtn.textContent = 'Reinstall';
                installBtn.onclick = function () {
                    showConfirm('Reinstall HACS', 'This will remove the current HACS and download the latest version. Continue?', function () { startOperation('install'); });
                };
            } else {
                statusBox.className = 'status not-installed';
                statusBox.textContent = 'HACS Not Installed';
                installBtn.textContent = 'Install HACS';
                installBtn.onclick = function () {
                    startOperation('install');
                };
            }

            syncButtonAvailability(false);
        }

        function applyOperationState(data, options = {}) {
            const { preserveCompletedState = true } = options;

            if (data.status === 'starting' || data.status === 'running') {
                activeOperationId = data.operation_id || activeOperationId;
                showProgress(data.message || 'Processing...');
                syncButtonAvailability(true);
                return;
            }

            if ((data.status === 'success' || data.status === 'error') && !preserveCompletedState) {
                activeOperationId = null;
                clearStatusPoller();
                hideProgress();
                resetResult();
                syncButtonAvailability(false);
                return;
            }

            if (data.status === 'success') {
                activeOperationId = null;
                clearStatusPoller();
                showResult('success', data.message, data.detail || '');
                if (data.operation === 'Install') {
                    applyInstalledState(true);
                } else if (data.operation === 'Uninstall') {
                    applyInstalledState(false);
                }
                syncButtonAvailability(false);
                return;
            }

            if (data.status === 'error') {
                activeOperationId = null;
                clearStatusPoller();
                showResult('error', data.message || 'Operation failed', data.detail || '');
                syncButtonAvailability(false);
                return;
            }

            if (activeOperationId) {
                showProgress('Preparing operation...');
                syncButtonAvailability(true);
                return;
            }

            clearStatusPoller();
            hideProgress();
            resetResult();
            syncButtonAvailability(false);
        }

        function fetchOperationState(options = {}) {
            return fetch('/api/status', { cache: 'no-store' })
                .then(response => response.json())
                .then(data => {
                    applyOperationState(data, options);
                    return data;
                });
        }

        function startOperation(op) {
            clearStatusPoller();
            activeOperationId = null;
            syncButtonAvailability(true);
            showProgress(op === 'install' ? 'Preparing installation...' : 'Preparing uninstallation...');
            resetResult();

            fetch('/api/' + op, { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        activeOperationId = data.operation_id || null;
                        showProgress(data.message || 'Processing...');
                        fetchOperationState();
                        statusPoller = setInterval(() => {
                            fetchOperationState();
                        }, 1000);
                    } else {
                        activeOperationId = null;
                        if (data.message === 'Task already in progress') {
                            fetchOperationState();
                            statusPoller = setInterval(() => {
                                fetchOperationState();
                            }, 1000);
                            return;
                        }
                        showResult('error', data.message || 'Failed to start operation');
                        syncButtonAvailability(false);
                    }
                })
                .catch(error => {
                    activeOperationId = null;
                    showResult('error', 'Request failed', String(error));
                    syncButtonAvailability(false);
                });
        }

        function restartHA() {
            clearStatusPoller();
            activeOperationId = null;
            syncButtonAvailability(true);
            showProgress('Restarting Home Assistant...');
            resetResult();

            fetch('/api/restart_ha', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        showResult('success', data.message);
                    } else {
                        showResult('error', data.message);
                    }
                    syncButtonAvailability(false);
                })
                .catch(error => {
                    showResult('error', 'Request failed', String(error));
                    syncButtonAvailability(false);
                });
        }

        // 点击遮罩层关闭弹窗
        document.getElementById('confirm-modal').addEventListener('click', function (e) {
            if (e.target === this) {
                hideConfirm();
            }
        });

        syncButtonAvailability(false);
        fetchOperationState({ preserveCompletedState: false }).catch(() => {
            syncButtonAvailability(false);
        });
    </script>
</body>

</html>
