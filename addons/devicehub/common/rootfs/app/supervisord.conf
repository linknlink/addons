[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

; ==================== 依赖服务 ====================

[program:mosquitto]
command=/usr/sbin/mosquitto -c /etc/mosquitto/mosquitto.conf
priority=10
autorestart=true
startsecs=2
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:mariadb]
command=/usr/bin/mysqld_safe
priority=20
autorestart=true
startsecs=5
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

; ==================== 业务服务 ====================

[program:ha2devicehub]
command=/app/wait-for-dependencies.sh 3306 1883 -- /etc/ha2devicehub/ha2devicehub /etc/ha2devicehub/output/ha2devicehub.toml
directory=/etc/ha2devicehub
priority=25
autorestart=true
startsecs=5
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:devicehubmanager]
command=/app/wait-for-dependencies.sh 3306 1883 -- /etc/devicehubmanager/devicehubmanager /etc/devicehubmanager/output/devicehubmanager.toml
directory=/etc/devicehubmanager
priority=30
autorestart=true
startsecs=5
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:iegcloudaccess]
command=/app/wait-for-dependencies.sh 3306 1883 -- /etc/iegcloudaccess/iegcloudaccess /etc/iegcloudaccess/output/iegcloudaccess.toml
directory=/etc/iegcloudaccess
priority=30
autorestart=true
startsecs=5
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:linknlinkedge]
command=/app/wait-for-dependencies.sh 3306 1883 -- /etc/linknlinkedge/linknlinkedge -config /etc/linknlinkedge/config.yaml
directory=/etc/linknlinkedge
priority=30
autorestart=true
startsecs=5
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

